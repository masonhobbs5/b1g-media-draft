[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP"]  # pycodestyle, pyflakes, warnings, isort, naming, pyupgrade
ignore = ["E501"]  # black handles line length

[tool.ruff.per-file-ignores]
"tests/*" = ["N802", "N803"]  # Allow lowercase test arg names

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true  # cfbd stubs are incomplete

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src --cov-report=term-missing --cov-report=html"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "scripts/*", "notebooks/*"]
