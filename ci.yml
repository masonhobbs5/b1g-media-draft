name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ config/ tests/ scripts/

      - name: Format check with black
        run: black --check src/ config/ tests/ scripts/

      - name: Type check with mypy
        run: mypy src/ config/
        continue-on-error: true   # don't fail CI on type errors during early dev

      - name: Run unit tests
        # No API keys set in CI — all tests use mocked responses or fallback data
        run: pytest tests/unit/ -v --cov=src --cov-report=term-missing
        env:
          CFBD_API_KEY: ""        # intentionally empty — tests use mocks
          ODDS_API_KEY: ""

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          CFBD_API_KEY: ""
          ODDS_API_KEY: ""

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
